<!doctype html>
<html lang="zh-CN" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INKFLOW — 登录</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="inkflow.css" />
    <style>
      /* Login page minor overrides */
      body {
        overflow: hidden;
      }
      @media (max-width: 768px) {
        body {
          overflow: auto;
        }
      }
      .auth-page {
        height: 100vh;
      }
      @media (max-width: 768px) {
        .auth-page {
          height: auto;
          min-height: 100vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-page">
      <!-- LEFT: Brand panel -->
      <div class="auth-left">
        <a href="index.hmtl" class="auth-brand">
          INKFLOW<span class="brand-dot"></span>
        </a>
        <h2 class="auth-left-title">
          记录思考，<br />分享智慧，<br />连接世界
        </h2>
        <p class="auth-left-sub">
          加入 INKFLOW，与数千位思考者一起探索技术、设计与人文的交汇之处。
        </p>
        <ul class="auth-feature-list">
          <li><i class="bi bi-check-circle-fill"></i> 128 篇原创深度文章</li>
          <li><i class="bi bi-check-circle-fill"></i> 每周精选技术动态推送</li>
          <li><i class="bi bi-check-circle-fill"></i> 收藏文章，随时回顾</li>
          <li><i class="bi bi-check-circle-fill"></i> 参与评论，交流观点</li>
        </ul>
      </div>

      <!-- RIGHT: Form panel -->
      <div class="auth-right">
        <!-- Top nav -->
        <div
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
          "
        >
          <a
            href="index.hmtl"
            style="
              font-size: 0.85rem;
              color: var(--ink-muted);
              display: flex;
              align-items: center;
              gap: 0.4rem;
            "
          >
            <i class="bi bi-arrow-left"></i> 返回首页
          </a>
          <button
            class="theme-toggle"
            id="themeToggle"
            style="
              background: var(--ink-surface);
              border-color: var(--ink-border);
              color: var(--ink-muted);
            "
            title="切换主题"
          >
            <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
          </button>
        </div>

        <!-- Form switch tabs -->
        <div
          style="
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: var(--ink-surface);
            border-radius: var(--radius-md);
            padding: 0.3rem;
            border: 1px solid var(--ink-border);
          "
        >
          <button
            id="tabLogin"
            onclick="switchTab('login')"
            style="
              flex: 1;
              padding: 0.55rem;
              border-radius: calc(var(--radius-md) - 2px);
              border: none;
              font-weight: 600;
              font-size: 0.9rem;
              cursor: pointer;
              transition: all var(--transition);
              font-family: var(--font-body);
              background: var(--ink-primary);
              color: #fff;
            "
          >
            登录
          </button>
          <button
            id="tabRegister"
            onclick="switchTab('register')"
            style="
              flex: 1;
              padding: 0.55rem;
              border-radius: calc(var(--radius-md) - 2px);
              border: none;
              font-weight: 600;
              font-size: 0.9rem;
              cursor: pointer;
              transition: all var(--transition);
              font-family: var(--font-body);
              background: transparent;
              color: var(--ink-muted);
            "
          >
            注册
          </button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm">
          <div class="auth-form-title">欢迎回来</div>
          <div class="auth-form-sub">登录你的 INKFLOW 账号，继续探索</div>

          <div class="auth-input-group">
            <label class="auth-label">邮箱地址</label>
            <div class="auth-input-icon-wrap">
              <i class="bi bi-envelope"></i>
              <input
                type="email"
                class="auth-input"
                id="loginEmail"
                placeholder="your@email.com"
              />
            </div>
          </div>

          <div class="auth-input-group">
            <label class="auth-label">密码</label>
            <div class="auth-input-icon-wrap">
              <i class="bi bi-lock"></i>
              <input
                type="password"
                class="auth-input"
                id="loginPassword"
                placeholder="输入密码"
                style="padding-right: 3rem"
              />
              <button
                onclick="togglePwd('loginPassword', this)"
                style="
                  position: absolute;
                  right: 0.9rem;
                  top: 50%;
                  transform: translateY(-50%);
                  background: none;
                  border: none;
                  cursor: pointer;
                  color: var(--ink-muted);
                  font-size: 1rem;
                  padding: 0;
                "
              >
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div class="auth-options">
            <label class="auth-remember">
              <input type="checkbox" /> 记住我
            </label>
            <a href="#" class="auth-forgot">忘记密码？</a>
          </div>

          <button class="btn-auth" onclick="doLogin()">
            <i class="bi bi-box-arrow-in-right me-1"></i> 登录
          </button>

          <div class="auth-divider">或通过以下方式登录</div>

          <button class="btn-auth-social">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              />
            </svg>
            使用 Google 账号登录
          </button>
          <button class="btn-auth-social">
            <i class="bi bi-github" style="font-size: 1.1rem"></i>
            使用 GitHub 账号登录
          </button>

          <div class="auth-switch">
            还没有账号？<a
              href="#"
              onclick="
                switchTab('register');
                return false;
              "
              >立即注册</a
            >
          </div>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" style="display: none">
          <div class="auth-form-title">创建账号</div>
          <div class="auth-form-sub">加入 INKFLOW 社区，开始你的阅读旅程</div>

          <div class="row g-3">
            <div class="col-6">
              <div class="auth-input-group">
                <label class="auth-label">姓名</label>
                <div class="auth-input-icon-wrap">
                  <i class="bi bi-person"></i>
                  <input
                    type="text"
                    class="auth-input"
                    placeholder="你的姓名"
                  />
                </div>
              </div>
            </div>
            <div class="col-6">
              <div class="auth-input-group">
                <label class="auth-label">用户名</label>
                <div class="auth-input-icon-wrap">
                  <i class="bi bi-at"></i>
                  <input
                    type="text"
                    class="auth-input"
                    placeholder="username"
                  />
                </div>
              </div>
            </div>
          </div>

          <div class="auth-input-group">
            <label class="auth-label">邮箱地址</label>
            <div class="auth-input-icon-wrap">
              <i class="bi bi-envelope"></i>
              <input
                type="email"
                class="auth-input"
                placeholder="your@email.com"
              />
            </div>
          </div>

          <div class="auth-input-group">
            <label class="auth-label">密码</label>
            <div class="auth-input-icon-wrap">
              <i class="bi bi-lock"></i>
              <input
                type="password"
                class="auth-input"
                placeholder="至少 8 位，包含字母和数字"
              />
            </div>
          </div>

          <div style="margin-bottom: 1.25rem">
            <div
              style="
                display: flex;
                align-items: flex-start;
                gap: 0.5rem;
                font-size: 0.85rem;
                color: var(--ink-muted);
              "
            >
              <input
                type="checkbox"
                style="
                  margin-top: 0.2rem;
                  accent-color: var(--ink-primary);
                  flex-shrink: 0;
                "
              />
              <span
                >我已阅读并同意
                <a href="#" style="color: var(--ink-primary)">服务条款</a> 和
                <a href="#" style="color: var(--ink-primary)">隐私政策</a></span
              >
            </div>
          </div>

          <button class="btn-auth" onclick="doRegister()">
            <i class="bi bi-person-plus me-1"></i> 创建账号
          </button>

          <div class="auth-switch">
            已有账号？<a
              href="#"
              onclick="
                switchTab('login');
                return false;
              "
              >立即登录</a
            >
          </div>
        </div>
      </div>
      <!-- /.auth-right -->
    </div>
    <!-- /.auth-page -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="inkflow.js"></script>
    <script>
      /* Login page specific logic */

      function switchTab(tab) {
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");
        const tabLogin = document.getElementById("tabLogin");
        const tabReg = document.getElementById("tabRegister");
        const activeStyle = "background:var(--ink-primary);color:#fff";
        const inactiveStyle = "background:transparent;color:var(--ink-muted)";

        if (tab === "login") {
          loginForm.style.display = "";
          registerForm.style.display = "none";
          tabLogin.style.cssText =
            activeStyle +
            ";flex:1;padding:.55rem;border-radius:calc(var(--radius-md) - 2px);border:none;font-weight:600;font-size:.9rem;cursor:pointer;transition:all var(--transition);font-family:var(--font-body)";
          tabReg.style.cssText =
            inactiveStyle +
            ";flex:1;padding:.55rem;border-radius:calc(var(--radius-md) - 2px);border:none;font-weight:600;font-size:.9rem;cursor:pointer;transition:all var(--transition);font-family:var(--font-body)";
        } else {
          loginForm.style.display = "none";
          registerForm.style.display = "";
          tabReg.style.cssText =
            activeStyle +
            ";flex:1;padding:.55rem;border-radius:calc(var(--radius-md) - 2px);border:none;font-weight:600;font-size:.9rem;cursor:pointer;transition:all var(--transition);font-family:var(--font-body)";
          tabLogin.style.cssText =
            inactiveStyle +
            ";flex:1;padding:.55rem;border-radius:calc(var(--radius-md) - 2px);border:none;font-weight:600;font-size:.9rem;cursor:pointer;transition:all var(--transition);font-family:var(--font-body)";
        }
      }

      function togglePwd(inputId, btn) {
        const input = document.getElementById(inputId);
        const isText = input.type === "text";
        input.type = isText ? "password" : "text";
        btn.querySelector("i").className = isText
          ? "bi bi-eye"
          : "bi bi-eye-slash";
      }

      function doLogin() {
        const email = document.getElementById("loginEmail").value;
        const pwd = document.getElementById("loginPassword").value;

        if (!email || !pwd) {
          showToast("请填写邮箱和密码", "error");
          return;
        }

        // 模拟登录成功 — 实际项目替换为 API 请求
        const btn = document.querySelector(".btn-auth");
        btn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i> 登录中…';
        btn.disabled = true;

        setTimeout(() => {
          // 写入用户信息到 localStorage（供其他页面读取）
          inkflowAuth.setUser({ name: "陈明远", initial: "陈" });
          showToast("登录成功，正在跳转…");
          setTimeout(() => {
            window.location.href = "index.hmtl";
          }, 800);
        }, 1200);
      }

      function doRegister() {
        showToast("注册功能开发中，敬请期待");
      }
    </script>
  </body>
</html>
