<!doctype html>
<html lang="zh-CN" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INKFLOW — 登录</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="inkflow.css" />
  </head>
  <body>
    <div class="auth-page">
      <!-- LEFT: Brand panel -->
      <div class="auth-left">
        <a href="index.html" class="auth-brand">
          INKFLOW<span class="brand-dot"></span>
        </a>
        <h2 class="auth-left-title">
          记录思考，<br />分享智慧，<br />连接世界
        </h2>
        <p class="auth-left-sub">
          加入 INKFLOW，与数千位思考者一起探索技术、设计与人文的交汇之处。
        </p>
        <ul class="auth-feature-list">
          <li><i class="bi bi-check-circle-fill"></i> 128 篇原创深度文章</li>
          <li><i class="bi bi-check-circle-fill"></i> 每周精选技术动态推送</li>
          <li><i class="bi bi-check-circle-fill"></i> 收藏文章，随时回顾</li>
          <li><i class="bi bi-check-circle-fill"></i> 参与评论，交流观点</li>
        </ul>
      </div>

      <!-- RIGHT: Form panel -->
      <div class="auth-right">
        <!-- Top nav -->
        <div class="auth-top-nav">
          <a href="index.html" class="auth-back-link">
            <i class="bi bi-arrow-left"></i> 返回首页
          </a>
          <button
            class="theme-toggle border text-success"
            id="themeToggle"
            title="切换主题"
          >
            <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
          </button>
        </div>

        <!-- Tab switcher (v2.0: .auth-tab-btn 替代 inline style + switchTab()) -->
        <div class="auth-tab-switcher">
          <button class="auth-tab-btn active" data-auth-tab="loginForm">
            登录
          </button>
          <button class="auth-tab-btn" data-auth-tab="registerForm">
            注册
          </button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm" class="auth-tab-pane">
          <div class="auth-form-title">欢迎回来</div>
          <div class="auth-form-sub">登录你的 INKFLOW 账号，继续探索</div>

          <div class="auth-input-group">
            <label class="auth-label">邮箱地址</label>
            <div class="auth-input-icon-wrap">
              <i class="bi bi-envelope"></i>
              <input
                type="email"
                class="auth-input"
                id="loginEmail"
                placeholder="your@email.com"
              />
            </div>
          </div>

          <div class="auth-input-group">
            <label class="auth-label">密码</label>
            <div class="auth-input-icon-wrap">
              <i class="bi bi-lock"></i>
              <input
                type="password"
                class="auth-input has-toggle"
                id="loginPassword"
                placeholder="输入密码"
              />
              <button
                class="auth-pwd-toggle"
                type="button"
                aria-label="显示/隐藏密码"
              >
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div class="auth-options">
            <label class="auth-remember">
              <input type="checkbox" /> 记住我
            </label>
            <a href="#" class="auth-forgot">忘记密码？</a>
          </div>

          <button class="btn-auth" id="doLoginBtn" type="button">
            <i class="bi bi-box-arrow-in-right me-1"></i> 登录
          </button>

          <div class="auth-divider">或通过以下方式登录</div>

          <button class="btn-auth-social" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              />
            </svg>
            使用 Google 账号登录
          </button>
          <button class="btn-auth-social" type="button">
            <i class="bi bi-github fs-6"></i>
            使用 GitHub 账号登录
          </button>

          <div class="auth-switch">
            还没有账号？<a href="#" data-auth-switch="registerForm">立即注册</a>
          </div>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" class="auth-tab-pane" style="display: none">
          <div class="auth-form-title">创建账号</div>
          <div class="auth-form-sub">加入 INKFLOW 社区，开始你的阅读旅程</div>

          <div class="row g-3">
            <div class="col-6">
              <div class="auth-input-group">
                <label class="auth-label">姓名</label>
                <div class="auth-input-icon-wrap">
                  <i class="bi bi-person"></i>
                  <input
                    type="text"
                    class="auth-input"
                    placeholder="你的姓名"
                  />
                </div>
              </div>
            </div>
            <div class="col-6">
              <div class="auth-input-group">
                <label class="auth-label">用户名</label>
                <div class="auth-input-icon-wrap">
                  <i class="bi bi-at"></i>
                  <input
                    type="text"
                    class="auth-input"
                    placeholder="username"
                  />
                </div>
              </div>
            </div>
          </div>

          <div class="auth-input-group">
            <label class="auth-label">邮箱地址</label>
            <div class="auth-input-icon-wrap">
              <i class="bi bi-envelope"></i>
              <input
                type="email"
                class="auth-input"
                placeholder="your@email.com"
              />
            </div>
          </div>

          <div class="auth-input-group">
            <label class="auth-label">密码</label>
            <div class="auth-input-icon-wrap">
              <i class="bi bi-lock"></i>
              <input
                type="password"
                class="auth-input"
                placeholder="至少 8 位，包含字母和数字"
              />
            </div>
          </div>

          <div class="auth-terms-row">
            <input type="checkbox" id="agreeTerms" />
            <label for="agreeTerms">
              我已阅读并同意 <a href="#">服务条款</a> 和
              <a href="#">隐私政策</a>
            </label>
          </div>

          <button class="btn-auth" id="doRegisterBtn" type="button">
            <i class="bi bi-person-plus me-1"></i> 创建账号
          </button>

          <div class="auth-switch">
            已有账号？<a href="#" data-auth-switch="loginForm">立即登录</a>
          </div>
        </div>
      </div>
      <!-- /.auth-right -->
    </div>
    <!-- /.auth-page -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="inkflow.js"></script>
  </body>
</html>
